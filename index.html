<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobiles Risc-Formular</title>
  <style>
    /* HIER KÖNNEN SIE DIE SCHRIFTGRÖSSE FÜR DAS SMARTPHONE EINSTELLEN */
    :root {
      --global-font-size: 18px; 
      --primary-color: #2c3e50;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: var(--global-font-size);
      line-height: 1.5;
      padding: 15px;
      margin: 0;
      background-color: #ffffff;
      color: #333;
    }

    .form-container {
      max-width: 100%;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary-color);
    }

    /* Alle Eingabefelder nutzen die volle Breite und Ihre Wunschgröße */
    input[type="text"], input[type="number"], input[type="email"], select, textarea {
      width: 100%;
      padding: 12px;
      font-size: var(--global-font-size);
      border: 2px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    /* Große Smartphone-Checkboxen */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="checkbox"] {
      width: 24px;
      height: 24px;
    }

    .submit-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      font-size: var(--global-font-size);
      font-weight: bold;
      border-radius: 6px;
      width: 100%;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2 id="form-title">Formular wird geladen...</h2>
    <form id="generated-form">
      </form>
    <div id="status"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const formId = urlParams.get('form');
    const formElement = document.getElementById('generated-form');

    if (formId) {
      // Wir holen uns die nackten Formular-Daten (JSON-Struktur) direkt von Ihrer Grist-Instanz
      const schemaUrl = `https://db.intranet.fgz-risc.de/api/forms/${formId}`;

      fetch(schemaUrl)
        .then(response => response.json())
        .then(data => {
          document.getElementById('form-title').innerText = data.name || "Formular";
          
          // Wir gehen durch alle Fragen, die Sie im Grist-Formular angelegt haben
          data.fields.forEach(field => {
            const div = document.createElement('div');
            div.className = "form-group";

            // Generierung basierend auf dem Grist-Typ (Text, Checkbox etc.)
            if (field.type === 'Bool') {
              div.className = "form-group checkbox-group";
              div.innerHTML = `<input type="checkbox" id="${field.colId}" name="${field.colId}"><label for="${field.colId}">${field.label}</label>`;
            } else if (field.type === 'Choice') {
              let options = field.widgetOptions?.choices?.map(o => `<option value="${o}">${o}</option>`).join('') || '';
              div.innerHTML = `<label>${field.label}</label><select name="${field.colId}">${options}</select>`;
            } else {
              div.innerHTML = `<label>${field.label}</label><input type="text" name="${field.colId}">`;
            }
            formElement.appendChild(div);
          });

          // Absendebutton hinzufügen
          const btn = document.createElement('button');
          btn.type = "submit";
          btn.className = "submit-btn";
          btn.innerText = "Absenden";
          formElement.appendChild(btn);
        })
        .catch(err => {
          document.getElementById('form-title').innerText = "Verbindungsfehler";
          console.error(err);
        });
    }

    // Daten zurück an Grist senden bei Klick auf Absenden
    formElement.addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('status').innerText = "Wird gesendet...";
      
      const formData = new FormData(formElement);
      const payload = { records: [{ fields: {} }] };
      
      formData.forEach((value, key) => {
        const inputElement = formElement.elements[key];
        payload.records[0].fields[key] = inputElement.type === 'checkbox' ? inputElement.checked : value;
      });

      // Absenden an die offizielle Grist-Schnittstelle für dieses spezifische Formular
      fetch(`https://db.intranet.fgz-risc.de/api/forms/${formId}/submit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (res.ok) {
          document.getElementById('status').innerText = "✓ Erfolgreich abgesendet!";
          document.getElementById('status').style.color = "green";
          formElement.reset();
        } else {
          document.getElementById('status').innerText = "Fehler beim Speichern.";
          document.getElementById('status').style.color = "red";
        }
      });
    });
  </script>
</body>
</html>
