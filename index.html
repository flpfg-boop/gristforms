<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Optimierte Formular-Ansicht</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow-x: hidden; /* Verhindert horizontales Scrollen der Hauptseite */
      background-color: #ffffff;
    }
    
    .iframe-wrapper {
      width: 100%;
      height: 100vh;
      overflow-x: hidden;
      overflow-y: auto; /* Erlaubt vertikales Scrollen für lange Formulare */
      position: relative;
    }

    iframe {
      border: none;
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }

    #error {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      color: #c0392b;
      display: none;
    }
  </style>
</head>
<body>

  <div id="error">
    <h2>Fehler: Keine gültige Formular-ID angegeben.</h2>
    <p>Bitte prüfen Sie den Link.</p>
  </div>

  <div class="iframe-wrapper">
    <iframe id="grist-iframe" style="display: none;"></iframe>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const zoomLevel = parseFloat(urlParams.get('zoom')) || 1.3; // Standard: 130% Vergrößerung
    const formId = urlParams.get('form'); 

    const iframe = document.getElementById('grist-iframe');
    const errorDiv = document.getElementById('error');

    if (formId) {
      /* AUTOMATISCHER RAHMEN-KILLER: 
        Wir hängen '?embed=true' an Ihre Intranet-URL. Dadurch schaltet Grist 
        in den rahmenlosen Fullscreen-Modus und füllt die komplette Breite aus.
      */
      const gristBaseUrl = `https://db.intranet.fgz-risc.de/forms/${formId}?embed=true`;
      iframe.src = gristBaseUrl;
      
      /* BREITEN-LIMITIERUNG:
        Durch die Division (100 / zoomLevel) bleibt das Formular trotz Zoom 
        mathematisch exakt innerhalb des Smartphone-Bildschirms stehen. 
        Grist bricht alle Inhalte automatisch um, ohne dass man nach rechts scrollen muss.
      */
      iframe.style.width = (100 / zoomLevel) + "%";
      iframe.style.height = (100 / zoomLevel) + "vh";
      iframe.style.transform = `scale(${zoomLevel})`;
      
      iframe.style.display = "block";
    } else {
      errorDiv.style.display = "block";
    }
  </script>
</body>
</html>
