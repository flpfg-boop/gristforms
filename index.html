<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobiles Formular</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; }
    #container { width: 100%; height: 100%; -webkit-overflow-scrolling: touch; overflow-y: scroll; }
    
    /* HIER REINIZIIEREN WIR IHR GEWÜNSCHTES CSS DIREKT IN DEN GRIST-RAHMEN */
    .grist-form-container, [class*="grist-form-container"] {
      max-width: 100% !important;
      margin: 0 !important;
      padding: 10px !important;
      border: none !important;
      box-shadow: none !important;
    }
    html, body, p, label, input, select, textarea {
      font-size: 18px !important; /* Ihre Wunschgröße */
    }
  </style>
</head>
<body>

  <div id="container">Lade Formular...</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const formId = urlParams.get('form');

    if (formId) {
      const targetUrl = `https://db.intranet.fgz-risc.de/forms/${formId}`;
      
      // Wir nutzen einen öffentlichen CORS-Proxy, um den Quelltext des Formulars zu laden
      fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`)
        .then(response => {
          if (response.ok) return response.json();
          throw new Error('Netzwerk-Fehler');
        })
        .then(data => {
          // Wir setzen den Grist-Inhalt direkt in unsere Seite ein
          const container = document.getElementById('container');
          container.innerHTML = data.contents;

          // Wir biegen die relativen Pfade von Grist um, damit Scripte und Bilder geladen werden
          const base = document.createElement('base');
          base.href = "https://db.intranet.fgz-risc.de/";
          document.head.appendChild(base);
        })
        .catch(err => {
          document.getElementById('container').innerText = "Das Formular konnte nicht geladen werden. Bitte stellen Sie sicher, dass Sie mit dem Intranet/VPN verbunden sind.";
        });
    } else {
      document.getElementById('container').innerText = "Fehler: Keine Formular-ID angegeben.";
    }
  </script>
</body>
</html>
