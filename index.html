<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Optimierte Formular-Ansicht</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      overflow-x: hidden; /* Verhindert horizontales Scrollen auf dem Smartphone */
      background-color: #ffffff; /* Erzwingt einen sauberen weißen Hintergrund */
    }
    
    .iframe-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden; /* Schneidet alles ab, was über den Bildschirmrand ragt */
      position: relative;
    }

    iframe {
      border: none;
      position: absolute;
      top: 0;
      
      /* TRICK: Wir machen das Iframe absichtlich breiter als den Bildschirm,
         um den graublauen Grist-Hintergrund links und rechts "wegzuschneiden" */
      width: 140%; 
      left: -20%; /* Verschiebt das Iframe nach links, sodass das Formular zentriert ist */
      height: 100%;

      transform-origin: top center;
    }

    #error {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
      color: #c0392b;
      display: none;
    }
  </style>
</head>
<body>

  <div id="error">
    <h2>Fehler: Keine gültige Formular-ID angegeben.</h2>
    <p>Bitte prüfen Sie den Link.</p>
  </div>

  <div class="iframe-wrapper">
    <iframe id="grist-iframe" style="display: none;"></iframe>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    // Da wir das Formular durch das Strecken bereits vergrößern, 
    // reicht hier meist ein kleinerer Zoom-Faktor (z.B. 1.15 oder 1.2) für perfekte Lesbarkeit.
    const zoomLevel = parseFloat(urlParams.get('zoom')) || 1.15; 
    const formId = urlParams.get('form'); 

    const iframe = document.getElementById('grist-iframe');
    const errorDiv = document.getElementById('error');

    if (formId) {
      // Reiner Formular-Link ohne den nicht funktionierenden Embed-Befehl
      const gristBaseUrl = `https://db.intranet.fgz-risc.de/forms/${formId}`;
      iframe.src = gristBaseUrl;
      
      // Kombinierte Skalierung: Das Formular füllt das Smartphone jetzt perfekt aus
      iframe.style.height = (100 / zoomLevel) + "vh";
      iframe.style.transform = `scale(${zoomLevel})`;
      
      iframe.style.display = "block";
    } else {
      errorDiv.style.display = "block";
    }
  </script>
</body>
</html>
